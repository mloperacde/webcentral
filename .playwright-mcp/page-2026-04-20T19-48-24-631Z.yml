                - generic [ref=e194]: 01. Infraestructura Industrial
              - paragraph [ref=e195]: "Capacidad productiva escalable: Operamos entre las mayores capacidades de envasado a terceros de Europa, con 30 líneas dedicadas funcionando simultáneamente. Esta escala nos permite absorber picos de demanda estacional y mantener tiempos de respuesta competitivos sin comprometer la calidad."
            - generic [ref=e196]:
              - generic [ref=e197]:
                - img [ref=e199]
                - generic [ref=e202]: 02. Versatilidad Tecnológica
              - paragraph [ref=e203]: "Multi-formato, multi-sector: Disponemos de 30 tecnologías de envasado diferenciadas (líneas rotativas, lineales, flow-pack, etiquetado, etc.) que nos permiten pivotar entre formatos cosméticos, sanitarios y alimentarios sin transición crítica. Una misma infraestructura, infinitas configuraciones."
            - generic [ref=e204]:
              - generic [ref=e205]:
                - img [ref=e207]
                - generic [ref=e210]: 03. Entorno Controlado
              - paragraph [ref=e211]: "Certificación y trazabilidad total: Fabricación en área sanitaria y envasado en 6 Salas Blancas certificadas y una Sala de Envasado Estéril, con planta de generación de agua purificada propia (700 L/h). Eliminamos riesgos de contaminación cruzada y garantizamos la trazabilidad batch desde la materia prima hasta el producto final."
          - generic [ref=e212]:
            - generic [ref=e213]:
              - generic [ref=e214]:
                - img [ref=e216]
                - generic [ref=e219]: 04. Control de Calidad Integrado
              - paragraph [ref=e220]: "Cero defectos en línea: Sistema de inspección y control de proceso continuo, complementado con etiquetado de alta precisión y acondicionamiento secundario. Cada envase es verificado antes de abandonar la línea."
            - generic [ref=e221]:
              - generic [ref=e222]:
                - img [ref=e224]
                - generic [ref=e227]: 05. Gestión Integral de Packaging
              - paragraph [ref=e228]: "Full Service real: Diseño técnico y sourcing de envases, impresión gráfica industrial y gestión de packaging exterior con red de colaboradores auditados y certificados. Tú aportas la fórmula; nosotros gestionamos todo lo demás."
            - generic [ref=e229]:
