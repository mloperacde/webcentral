                - generic [ref=e728]: 05. Gestión Integral de Packaging
              - paragraph [ref=e729]: "Full Service real: Diseño técnico y sourcing de envases, impresión gráfica industrial y gestión de packaging exterior con red de colaboradores auditados y certificados. Tú aportas la fórmula; nosotros gestionamos todo lo demás."
            - generic [ref=e730]:
