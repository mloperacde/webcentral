                - generic [ref=e695]: 01. Infraestructura Industrial
              - paragraph [ref=e696]: "Capacidad productiva escalable: Operamos entre las mayores capacidades de envasado a terceros de Europa, con 30 líneas dedicadas funcionando simultáneamente. Esta escala nos permite absorber picos de demanda estacional y mantener tiempos de respuesta competitivos sin comprometer la calidad."
            - generic [ref=e697]:
              - generic [ref=e698]:
                - img [ref=e700]
                - generic [ref=e703]: 02. Versatilidad Tecnológica
              - paragraph [ref=e704]: "Multi-formato, multi-sector: Disponemos de 30 tecnologías de envasado diferenciadas (líneas rotativas, lineales, flow-pack, etiquetado, etc.) que nos permiten pivotar entre formatos cosméticos, sanitarios y alimentarios sin transición crítica. Una misma infraestructura, infinitas configuraciones."
            - generic [ref=e705]:
              - generic [ref=e706]:
                - img [ref=e708]
                - generic [ref=e711]: 03. Entorno Controlado
              - paragraph [ref=e712]: "Certificación y trazabilidad total: Fabricación en área sanitaria y envasado en 6 Salas Blancas certificadas y una Sala de Envasado Estéril, con planta de generación de agua purificada propia (700 L/h). Eliminamos riesgos de contaminación cruzada y garantizamos la trazabilidad batch desde la materia prima hasta el producto final."
          - generic [ref=e713]:
            - generic [ref=e714]:
              - generic [ref=e715]:
